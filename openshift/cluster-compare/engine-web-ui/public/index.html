<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cluster Info Compare</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="page-header">
    <div>
      <h1>Cluster Info Compare</h1>
      <p class="subtitle">Compare HelloSpoke cluster version and operator snapshots over time</p>
    </div>
    <div class="header-actions">
      <label>
        Cluster
        <select id="clusterSelect">
          <option value="">Select a cluster…</option>
        </select>
      </label>
      <button id="syncBtn" type="button">Sync from cluster</button>
    </div>
  </header>

  <section id="statusBar" class="status-bar" hidden></section>

  <main>
    <div id="emptyState" class="empty-state">
      <p>Select a cluster or sync data from your OpenShift hub to begin.</p>
    </div>
    <div id="tableWrap" class="table-wrap" hidden>
      <table id="compareTable">
        <thead>
          <tr id="tableHeadRow">
            <th class="sticky-col">Component</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </main>

  <script src="/app.js"></script>
</body>
</html>
