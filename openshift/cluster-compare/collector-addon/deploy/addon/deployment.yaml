kind: Deployment
apiVersion: apps/v1
metadata:
  name: cluster-compare-collector-addon-manager
  namespace: open-cluster-management
  labels:
    app: cluster-compare-collector-addon-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cluster-compare-collector-addon-manager
  template:
    metadata:
      labels:
        app: cluster-compare-collector-addon-manager
    spec:
      serviceAccountName: cluster-compare-collector-addon-sa
      containers:
      - name: cluster-compare-collector-addon-manager
        image: quay.io/open-cluster-management/addon-contrib/cluster-compare-collector-addon:latest
        imagePullPolicy: IfNotPresent
        args:
          - "manager"
