apiVersion: addon.open-cluster-management.io/v1alpha1
kind: AddOnTemplate
metadata:
  name: clustercollector
  annotations:
    # Forces ArgoCD to skip local schema validation on this specific block
    argocd.argoproj.io/sync-options: SkipDryRunOnFields=spec.agentSpec.workload.manifestConfigs
spec:
  addonName: cluster-collector
  agentSpec:
    workload:
      manifests:
        - kind: CustomResourceDefinition
          apiVersion: apiextensions.k8s.io/v1
          metadata:
            name: clustercollectors.open-cluster-management.io
          spec:
            group: open-cluster-management.io
            names:
              kind: ClusterCollector
              listKind: ClusterCollectorList
              plural: clustercollectors
              singular: clustercollector
            scope: Namespaced
            versions:
              - name: v1alpha1
                served: true
                storage: true
                subresources:
                  status: {}
                schema:
                  openAPIV3Schema:
                    type: object
                    properties:
                      apiVersion:
                        type: string
                      kind:
                        type: string
                      metadata:
                        type: object
                      spec:
                        type: object
                      status:
                        type: object
                        properties:
                          clusterName:
                            type: string
                          spokeURL:
                            type: string
                          date:
                            type: string
                          lastSync:
                            type: string
        - kind: ClusterRole
          apiVersion: rbac.authorization.k8s.io/v1
          metadata:
            name: cluster-collector-agent
          rules:
            - apiGroups: [""]
              resources: ["pods", "configmaps", "events"]
              verbs: ["get", "list", "watch", "create", "update", "patch"]
            - apiGroups: ["coordination.k8s.io"]
              resources: ["leases"]
              verbs: ["create", "get", "list", "update", "watch", "patch"]
            - apiGroups: ["open-cluster-management.io"]
              resources: ["clustercollectors"]
              verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
            - apiGroups: ["open-cluster-management.io"]
              resources: ["clustercollectors/status"]
              verbs: ["get", "update", "patch"]
            - apiGroups: ["config.openshift.io"]
              resources: ["clusterversions", "clusteroperators"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["operators.coreos.com"]
              resources: ["clusterserviceversions"]
              verbs: ["get", "list", "watch"]
        - kind: ClusterRoleBinding
          apiVersion: rbac.authorization.k8s.io/v1
          metadata:
            name: cluster-collector-agent
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: ClusterRole
            name: cluster-collector-agent
          subjects:
            - kind: ServiceAccount
              name: cluster-collector-agent-sa
              namespace: open-cluster-management-agent-addon
        - kind: ServiceAccount
          apiVersion: v1
          metadata:
            name: cluster-collector-agent-sa
            namespace: open-cluster-management-agent-addon
        - kind: Deployment
          apiVersion: apps/v1
          metadata:
            name: cluster-collector-agent
            namespace: open-cluster-management-agent-addon
            labels:
              app: cluster-collector-agent
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: cluster-collector-agent
            template:
              metadata:
                labels:
                  app: cluster-collector-agent
              spec:
                serviceAccountName: cluster-collector-agent-sa
                containers:
                  - name: cluster-collector-agent
                    image: quay.io/marrober/cluster-compare-collector
                    imagePullPolicy: IfNotPresent
                    args:
                      - "agent"
                      - "--hub-kubeconfig={{HUB_KUBECONFIG}}"
                      - "--cluster-name={{CLUSTER_NAME}}"
                      - "--resync-interval=60"
      manifestConfigs:
        - resourceIdentifier:
            group: apps
            resource: "*"
            name: cluster-collector-agent
            namespace: open-cluster-management-agent-addon
          updateStrategy:
            type: ServerSideApply
  registration:
    - type: KubeClient
      kubeClient:
        hubPermissions:
          - type: CurrentCluster
            currentCluster:
              clusterRoleName: open-cluster-management:cluster-collector:agent
