apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: collector-addon
spec:
  params:
      # Buildah step configuration parameters - storage driver and TLS settings.
      #
    - name: STORAGE_DRIVER
      type: string
      default: vfs
    - name: TLSVERIFY
      type: string
      default: 'false'
      #
      # Git repository parameters
      #
    ## Repository parameters
    - name: GIT_REPO
      type: string
    - name: GIT_REVISION
      default: ""
      type: string
    - name: GIT_REPO_NAME
      type: string
    - name: app-dir
      type: string
    - name: dockerfile
      type: string
    - name: target-container-location
      type: string
    - name: image-short-name
      type: string
    - name: imagestream-url
      type: string
  tasks:
##------------------------------------------------------------------
# Git clone resources task
##------------------------------------------------------------------
    - name: git-clone-resources
      params:
      - name: url
        value: $(params.GIT_REPO)
      - name: revision
        value: $(params.GIT_REVISION)
      - name: repoName
        value: $(params.GIT_REPO_NAME)
      - name: subdirectory
        value: "."
      - name: verbose
        value: 'false'
      - name: deleteExisting
        value: 'true'
      taskRef:
        kind: Task
        name:  git-clone
      workspaces:
      - name: output
        workspace: resources
##------------------------------------------------------------------
# Build the container
##------------------------------------------------------------------
    - name: build
      params:
        - name: TLSVERIFY
          value: "$(params.TLSVERIFY)"
        - name: STORAGE_DRIVER
          value: $(params.STORAGE_DRIVER)
        - name: app-dir
          value: $(params.app-dir)
        - name: dockerfile
          value: $(params.dockerfile)
        - name: target-container-location
          value: $(params.target-container-location)
      taskRef:
        kind: Task
        name: build
      runAfter:
      - git-clone-resources
      workspaces:
      - name: files
        workspace: files
      - name: resources
        workspace: resources
#------------------------------------------------------------------
# Push the new runtime image to OpenShift quay
#------------------------------------------------------------------
    - name: push-image-to-imagestream
      params:
      - name: imagestream-url
        value: $(params.imagestream-url)
      - name: STORAGE_DRIVER
        value: $(params.STORAGE_DRIVER)
      - name: TLSVERIFY
        value: "$(params.TLSVERIFY)"
      - name: pipelineRunName
        value: $(context.pipelineRun.name)
      - name: image-short-name
        value: $(params.image-short-name)
      taskRef:
        kind: Task
        name: push-image-to-ocp
      runAfter:
        - build
      workspaces:
      - name: files
        workspace: files
##------------------------------------------------------------------
# Workspace definitions
##------------------------------------------------------------------
  workspaces:
    - name: resources
    - name: files
