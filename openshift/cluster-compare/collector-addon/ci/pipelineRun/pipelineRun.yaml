apiVersion: tekton.dev/v1beta1
kind: PipelineRun
metadata:
  generateName: collector-addon-pr-
spec:
  pipelineRef:
    name: collector-addon
  params:
    - name: git-url
      value: https://github.com/marrober/development.git
    - name: git-revision
      value: main
    - name: app-dir
      value: openshift/cluster-compare/collector-addon
    - name: dockerfile
      value: Dockerfile
    - name: target-container-location
      value: default-route-openshift-image-registry.apps.ocp4.mr-openshift.co.uk/$(context.taskRun.namespace)/cluster-collector
    - name: image-short-name
      value: cluster-collector
    - name: imagestream-url
      value: default-route-openshift-image-registry.apps.ocp4.mr-openshift.co.uk/$(context.taskRun.namespace)/cluster-collector
  workspaces:
  - name: files
    volumeClaimTemplate:
      spec:
        accessModes:
        - ReadWriteOnce
        resources:
          requests:
            storage: 20Gi
  - name: resources
    volumeClaimTemplate:
      spec:
        accessModes:
        - ReadWriteOnce
        resources:
        
          requests:
            storage: 5Gi